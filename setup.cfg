[nosetests]
verbosity = 2
with-coverage = 1
cover-erase = 1
cover-package = service
cover-html = 1
cover-html-dir = cover
cover-min-percentage = 95

[coverage:run]
source = service
omit =
    service/__init__.py

[coverage:report]
show_missing = True
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:

[flake8]
max-line-length = 127
max-complexity = 10
exclude = .git,__pycache__,venv,.venv,cover

[pylint]
max-line-length = 127
disable = missing-docstring,too-few-public-methods
ignore = venv,.venv,cover
